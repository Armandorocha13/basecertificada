<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Auditoria Logística | Home</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/img/logo.png" />
    <!-- Fonte Inter do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen relative overflow-hidden text-white bg-black">

    <!-- Imagem de Fundo Premium -->
    <div class="fixed inset-0 z-[-1] pointer-events-none"
        style="background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('/img/premium_bg.png'); background-size: cover; background-position: center; background-repeat: no-repeat; filter: blur(6px); transform: scale(1.1);">
    </div>

    <!-- Conteúdo Centralizado -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <div class="flex flex-col items-center animate-in fade-in zoom-in duration-1000">
            <!-- Logo com Efeito Flare -->
            <div class="mb-12 relative group">
                <div class="absolute inset-0 bg-white/10 blur-3xl rounded-full scale-150 opacity-50 group-hover:opacity-100 transition-opacity"></div>
                <div class="relative p-10 bg-white/[0.03] backdrop-blur-3xl rounded-full border border-white/20 shadow-2xl animate-float">
                    <img src="/img/logo.png" alt="Logo FFA"
                        class="h-32 w-auto object-contain filter brightness-0 invert" />
                </div>
            </div>

            <!-- Título e Subtítulo -->
            <div class="text-center mb-12">
                <h2 class="text-xs md:text-sm font-bold tracking-[0.6em] text-gray-400 mb-4 uppercase">
                    Portal Corporativo
                </h2>
                <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-white mb-6">
                    AUDITORIA <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-400 to-gray-600">LOGÍSTICA</span>
                </h1>
                <div class="h-1 w-24 bg-gradient-to-r from-transparent via-white/40 to-transparent mx-auto rounded-full"></div>
            </div>

            <!-- Botão Acessar -->
            <a href="/src/pages/selecao.html"
                class="group relative inline-flex items-center justify-center px-12 py-5 font-bold text-white transition-all duration-500 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-white/30 hover:shadow-[0_0_50px_rgba(255,255,255,0.1)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-white/50 backdrop-blur-xl overflow-hidden">
                <span class="relative z-10 flex items-center gap-4 text-lg tracking-widest">
                    REQUISITAR ACESSO
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 transition-transform group-hover:translate-x-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                    </svg>
                </span>
                <!-- Efeito Hover Shine -->
                <div class="absolute inset-0 translate-x-[-100%] group-hover:translate-x-[100%] bg-gradient-to-r from-transparent via-white/10 to-transparent transition-transform duration-1000"></div>
            </a>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="p-8 text-center text-[10px] text-gray-500 uppercase tracking-[0.4em] animate-fade-in">
        &copy; 2026 FFA Infraestrutura - <span class="text-gray-400">Excelência em Logística</span>
    </footer>

    <!-- Script de import dos estilos -->
    <script type="module">
        import './src/style.css';
    </script>
</body>

</html>
